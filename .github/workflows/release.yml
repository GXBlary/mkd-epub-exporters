name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build Windows GUI Executables & Setup Installer
        run: |
          # Install rsrc for Windows resources compiling and wails for GUI
          go install github.com/akavel/rsrc@latest
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          
          # Create embed folder
          mkdir -p go/cmd/installer/embed
          
          # Build Wails GUI for Windows
          cd go/cmd/converter-gui
          $(go env GOPATH)/bin/wails build -platform windows/amd64 -clean -o markitdown.exe
          cd ../..
          mv cmd/converter-gui/build/bin/markitdown.exe cmd/installer/embed/markitdown.exe
          
          # Build all other sub-binaries for Windows
          GOOS=windows GOARCH=amd64 go build -o cmd/installer/embed/markitdown-cli.exe ./cmd/converter-cli
          GOOS=windows GOARCH=amd64 go build -ldflags="-H=windowsgui" -o cmd/installer/embed/print-watcher.exe ./cmd/print-watcher
          GOOS=windows GOARCH=amd64 go build -ldflags="-H=windowsgui" -o cmd/installer/embed/markitdown-printer.exe ./cmd/printer-markdown
          GOOS=windows GOARCH=amd64 go build -ldflags="-H=windowsgui" -o cmd/installer/embed/epub-printer.exe ./cmd/printer-epub
          cd ..
          
          # Copy dlls & license to embed folder
          cp resources/mfilemon.dll go/cmd/installer/embed/
          cp resources/mfilemonUI.dll go/cmd/installer/embed/
          cp LICENSE-THIRD-PARTY.md go/cmd/installer/embed/
          
          # Download and extract Pandoc
          wget https://github.com/jgm/pandoc/releases/download/3.1.11.1/pandoc-3.1.11.1-windows-x86_64.zip
          unzip pandoc-3.1.11.1-windows-x86_64.zip
          mv pandoc-3.1.11.1/pandoc.exe go/cmd/installer/embed/
          rm -rf pandoc-3.1.11.1-windows-x86_64.zip pandoc-3.1.11.1
          
          # Compile resources and build installer
          cd go/cmd/installer
          $(go env GOPATH)/bin/rsrc -manifest installer.manifest -o rsrc.syso
          cd ../..
          GOOS=windows GOARCH=amd64 go build -ldflags="-H=windowsgui" -o ../markitdown-setup.exe ./cmd/installer
          cd ..

      - name: Build Linux CLI Binary
        run: |
          cd go
          GOOS=linux GOARCH=amd64 go build -o ../markitdown-linux-amd64 ./cmd/converter-cli
          cd ..
          tar -czvf markitdown-linux-amd64.tar.gz markitdown-linux-amd64 LICENSE-THIRD-PARTY.md
          rm markitdown-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            markitdown-setup.exe
            markitdown-linux-amd64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release-macos:
    name: Build & Release macOS
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build macOS GUI & CLI Binaries
        run: |
          # Install Wails CLI
          go install github.com/wailsapp/wails/v2/cmd/wails@latest
          
          # Build macOS Wails GUI App (Universal)
          cd go/cmd/converter-gui
          $(go env GOPATH)/bin/wails build -platform darwin/universal -clean -o MarkItDown
          cd ../../..
          
          # Build macOS CLI Binaries (Intel & Apple Silicon)
          cd go
          GOOS=darwin GOARCH=amd64 go build -o ../markitdown-darwin-amd64 ./cmd/converter-cli
          GOOS=darwin GOARCH=arm64 go build -o ../markitdown-darwin-arm64 ./cmd/converter-cli
          cd ..

      - name: Build macOS PKG Installer
        run: |
          # Create folders for installer payload and scripts
          mkdir -p pkg_root/Applications
          mkdir -p pkg_root/usr/local/bin
          mkdir -p "pkg_root/Library/PDF Services"
          mkdir -p pkg_scripts
          
          # Copy Wails GUI App bundle
          cp -R go/cmd/converter-gui/build/bin/MarkItDown.app pkg_root/Applications/
          
          # Create universal binary using lipo
          lipo -create -output pkg_root/usr/local/bin/markitdown-cli markitdown-darwin-amd64 markitdown-darwin-arm64
          chmod +x pkg_root/usr/local/bin/markitdown-cli
          
          # Copy PDF Services shell scripts
          cp "macos/Print to Markdown.sh" "pkg_root/Library/PDF Services/Print to Markdown"
          cp "macos/Print to EPUB.sh" "pkg_root/Library/PDF Services/Print to EPUB"
          chmod +x "pkg_root/Library/PDF Services/Print to Markdown"
          chmod +x "pkg_root/Library/PDF Services/Print to EPUB"
          
          # Create a postinstall script to ensure correct permissions
          cat << 'EOF' > pkg_scripts/postinstall
          #!/bin/sh
          chmod -R 755 "/Applications/MarkItDown.app"
          chmod +x "/usr/local/bin/markitdown-cli"
          chmod +x "/Library/PDF Services/Print to Markdown"
          chmod +x "/Library/PDF Services/Print to EPUB"
          exit 0
          EOF
          chmod +x pkg_scripts/postinstall
          
          # Build the .pkg installer
          pkgbuild --root pkg_root \
                   --identifier "com.gxblary.markitdown" \
                   --version "${{ github.ref_name }}" \
                   --install-location "/" \
                   --scripts pkg_scripts \
                   markitdown-setup-macos.pkg

      - name: Create Tarballs for CLI
        run: |
          tar -czvf markitdown-darwin-amd64.tar.gz markitdown-darwin-amd64 LICENSE-THIRD-PARTY.md
          tar -czvf markitdown-darwin-arm64.tar.gz markitdown-darwin-arm64 LICENSE-THIRD-PARTY.md

      - name: Update GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            markitdown-setup-macos.pkg
            markitdown-darwin-amd64.tar.gz
            markitdown-darwin-arm64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
